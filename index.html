<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>Aslin 💕 Mi Galaxia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100vw;height:100vh;overflow:hidden;background:#00000f;touch-action:none}
#c{position:fixed;top:0;left:0;width:100%;height:100%;touch-action:none}

/* ── INTRO SCREEN ── */
#intro{
  position:fixed;inset:0;z-index:3000;
  background:radial-gradient(ellipse at center,rgba(30,5,80,.98),rgba(0,0,15,1));
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity 1.2s ease;
}
#intro.fadeout{opacity:0;pointer-events:none}
.intro-rose{font-size:clamp(48px,10vw,72px);animation:roseSpin 3s ease-in-out infinite}
@keyframes roseSpin{0%,100%{transform:scale(1) rotate(-8deg);filter:drop-shadow(0 0 12px rgba(200,80,255,.6))}50%{transform:scale(1.15) rotate(8deg);filter:drop-shadow(0 0 28px rgba(200,80,255,.9))}}
.intro-title{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(22px,5vw,36px);background:linear-gradient(120deg,#e0c8ff,#a5f3fc,#f0abfc,#ffd6e0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;padding:0 20px}
.intro-sub{font-family:'Cinzel Decorative',serif;font-size:clamp(8px,2vw,11px);letter-spacing:5px;color:rgba(180,140,255,.65);text-align:center}
.intro-btn{
  margin-top:10px;padding:14px 38px;border-radius:50px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#8b2fff,#e91e8c);
  color:#fff;font-family:'Cormorant Garamond',serif;font-size:18px;letter-spacing:2px;
  box-shadow:0 0 30px rgba(140,40,255,.6),0 4px 20px rgba(0,0,0,.5);
  transition:.3s;animation:btnPulse 2s ease-in-out infinite;
}
.intro-btn:hover{transform:scale(1.08);box-shadow:0 0 50px rgba(180,60,255,.9)}
@keyframes btnPulse{0%,100%{box-shadow:0 0 30px rgba(140,40,255,.5)}50%{box-shadow:0 0 55px rgba(180,80,255,.9)}}
.intro-crowns{font-size:clamp(18px,4vw,26px);letter-spacing:12px;color:rgba(255,200,80,.6);animation:crownGlow 2s ease-in-out infinite}
@keyframes crownGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(255,200,80,.4));opacity:.7}50%{filter:drop-shadow(0 0 14px rgba(255,220,80,.9));opacity:1}}

/* ── MUSIC BTN ── */
#musbtn{
  position:fixed;bottom:20px;right:16px;z-index:400;
  background:linear-gradient(135deg,rgba(100,20,220,.92),rgba(0,100,200,.92));
  border:1px solid rgba(180,140,255,.5);border-radius:50px;
  padding:11px 20px;color:#e8d8ff;font-size:13px;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  box-shadow:0 0 28px rgba(120,60,255,.5),0 4px 20px rgba(0,0,0,.6);
  transition:.3s;font-family:'Cormorant Garamond',serif;letter-spacing:1.5px;
  backdrop-filter:blur(10px);
}
#musbtn:hover{box-shadow:0 0 44px rgba(160,80,255,.8);transform:scale(1.06)}
.note{font-size:20px;animation:noteWave 2s ease-in-out infinite}
@keyframes noteWave{0%,100%{transform:rotate(-12deg) scale(1)}50%{transform:rotate(12deg) scale(1.15)}}

/* ── FLOATING PARTICLES ── */
.fpart{position:fixed;pointer-events:none;z-index:150;animation:floatUp 5s ease-in forwards}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(.4) rotate(-15deg)}15%{opacity:1;transform:translateY(-25px) scale(1) rotate(5deg)}100%{opacity:0;transform:translateY(-240px) scale(.6) rotate(-10deg)}}

/* ── CLICK BURST ── */
.burst{position:fixed;pointer-events:none;z-index:160;font-size:20px;animation:burstAnim .8s ease-out forwards}
@keyframes burstAnim{0%{opacity:1;transform:scale(0) rotate(0deg)}100%{opacity:0;transform:scale(2.5) rotate(180deg)}}

/* ── MUSIC POPUP ── */
#muspopup{display:none;position:fixed;inset:0;z-index:2000;background:radial-gradient(ellipse at center,rgba(20,5,60,.95),rgba(0,0,20,.98));backdrop-filter:blur(18px);justify-content:center;align-items:center;}
#muspopup.show{display:flex}
.muspop-box{background:radial-gradient(ellipse at 30% 20%,rgba(140,60,255,.2),transparent 55%),radial-gradient(ellipse at 75% 80%,rgba(0,140,255,.15),transparent 55%),linear-gradient(155deg,rgba(14,6,48,.98),rgba(6,3,30,.99));border:1px solid rgba(180,130,255,.4);border-radius:22px;padding:38px 40px;text-align:center;box-shadow:0 0 70px rgba(140,40,255,.35);max-width:400px;width:92vw;}
.muspop-title{font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:5px;color:rgba(200,160,255,.7);margin-bottom:12px;text-transform:uppercase}
.muspop-icon{font-size:50px;margin-bottom:10px;animation:popIcon 2s ease-in-out infinite}
@keyframes popIcon{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(1.12) rotate(5deg)}}
.muspop-song{font-family:'Playfair Display',serif;font-size:24px;font-style:italic;background:linear-gradient(135deg,#f472b6,#818cf8,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.muspop-artist{font-family:'Cormorant Garamond',serif;font-size:15px;color:rgba(180,160,255,.65);margin-bottom:28px;letter-spacing:1px}
.muspop-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.muspop-btn{font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:1px;padding:12px 24px;border-radius:50px;cursor:pointer;border:none;transition:.25s}
.muspop-open{background:linear-gradient(135deg,#8b2fff,#0099cc);color:#fff;box-shadow:0 0 22px rgba(120,60,255,.5)}
.muspop-open:hover{transform:scale(1.07);box-shadow:0 0 35px rgba(140,80,255,.85)}
.muspop-skip{background:rgba(255,255,255,.07);color:rgba(200,180,255,.65);border:1px solid rgba(160,120,255,.3)}
.muspop-skip:hover{background:rgba(255,255,255,.13)}

/* ── OVERLAY ── */
#overlay{display:none;position:fixed;inset:0;z-index:999;background:radial-gradient(ellipse at 40% 30%,rgba(30,8,90,.92),rgba(0,5,28,.97));backdrop-filter:blur(18px);justify-content:center;align-items:center;padding:16px;}
#overlay.open{display:flex}

/* ── CARD ── */
#card{
  position:relative;width:min(540px,96vw);max-height:88vh;overflow-y:auto;
  background:radial-gradient(ellipse at 20% 10%,rgba(150,50,255,.24),transparent 48%),radial-gradient(ellipse at 85% 88%,rgba(0,150,255,.18),transparent 48%),radial-gradient(ellipse at 55% 55%,rgba(200,50,255,.1),transparent 60%),linear-gradient(158deg,rgba(12,5,42,.99),rgba(5,3,25,1));
  border-radius:28px;overflow:hidden;
  box-shadow:0 0 0 1.5px rgba(200,140,255,.45),0 0 70px rgba(130,50,255,.4),0 0 140px rgba(0,120,255,.16),0 0 0 4px rgba(255,150,220,.06);
  animation:cardPop .55s cubic-bezier(.34,1.56,.64,1);
  scrollbar-width:thin;scrollbar-color:rgba(140,80,255,.4) transparent;
}
#card::-webkit-scrollbar{width:4px}
#card::-webkit-scrollbar-thumb{background:rgba(140,80,255,.4);border-radius:4px}
@keyframes cardPop{from{transform:scale(.42) rotateY(18deg) rotateX(8deg);opacity:0}to{transform:scale(1) rotateY(0) rotateX(0);opacity:1}}
.card-top{width:100%;height:6px;background:linear-gradient(90deg,#a855f7,#38bdf8,#f472b6,#fbbf24,#818cf8,#a855f7);background-size:300% 100%;animation:barShift 3s linear infinite}
@keyframes barShift{0%{background-position:0%}100%{background-position:300%}}
.card-corner{position:absolute;font-size:22px;pointer-events:none;z-index:10;animation:cOrn 2.5s ease-in-out infinite}
.card-corner.tl{top:12px;left:14px}.card-corner.tr{top:12px;right:42px;animation-delay:.6s}.card-corner.bl{bottom:14px;left:14px;animation-delay:1.2s}.card-corner.br{bottom:14px;right:14px;animation-delay:1.8s}
@keyframes cOrn{0%,100%{opacity:.5;transform:scale(.88) rotate(0deg)}50%{opacity:1;transform:scale(1.18) rotate(22deg)}}
#cStars{position:absolute;inset:0;pointer-events:none;z-index:0}
.card-inner{position:relative;z-index:1;padding:22px 28px 28px}
#close-btn{position:absolute;top:14px;right:14px;background:rgba(140,80,255,.2);border:1px solid rgba(180,130,255,.45);color:rgba(210,180,255,.9);font-size:15px;cursor:pointer;border-radius:50%;width:34px;height:34px;min-width:34px;display:flex;align-items:center;justify-content:center;transition:.3s;z-index:20;}
#close-btn:hover{color:#fff;background:rgba(180,100,255,.55);transform:rotate(90deg) scale(1.12)}

/* card content */
.card-crown{text-align:center;font-size:clamp(22px,4.5vw,30px);animation:crownGlow 2s ease-in-out infinite;margin-bottom:6px;letter-spacing:12px}
.card-roses{text-align:center;font-size:clamp(18px,4vw,26px);letter-spacing:8px;margin-bottom:8px;line-height:1}
.card-roses span{display:inline-block;animation:roseWave 2.2s ease-in-out infinite}
.card-roses span:nth-child(2){animation-delay:.25s;font-size:.65em;opacity:.55}.card-roses span:nth-child(4){animation-delay:.25s;font-size:.65em;opacity:.55}.card-roses span:nth-child(3){animation-delay:.5s}
@keyframes roseWave{0%,100%{transform:scale(1) rotate(-6deg)}50%{transform:scale(1.2) rotate(6deg)}}
.card-deco{text-align:center;font-size:clamp(12px,2.5vw,16px);letter-spacing:6px;margin-bottom:10px;color:rgba(180,200,255,.45)}
.card-deco span{display:inline-block;animation:dStar 1.9s ease-in-out infinite}
.card-deco span:nth-child(odd){animation-delay:.35s}
@keyframes dStar{0%,100%{opacity:.4;transform:scale(.9)}50%{opacity:.9;transform:scale(1.2)}}
.sub{font-family:'Cinzel Decorative',serif;font-size:clamp(8px,1.8vw,10px);letter-spacing:5px;text-transform:uppercase;color:rgba(160,220,255,.82);margin-bottom:10px;text-align:center}
.ttl{font-family:'Playfair Display',serif;font-size:clamp(17px,3.5vw,22px);font-weight:700;font-style:italic;background:linear-gradient(120deg,#e0c8ff 0%,#a5f3fc 32%,#f0abfc 62%,#ffd6e0 82%,#e0c8ff 100%);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:titleShift 4.5s linear infinite;margin-bottom:16px;line-height:1.45;text-align:center}
@keyframes titleShift{0%{background-position:0%}100%{background-position:200%}}
.divider{display:flex;align-items:center;gap:8px;margin:0 auto 18px;justify-content:center}
.divider::before,.divider::after{content:'';flex:1;height:1px;max-width:50px;background:linear-gradient(90deg,transparent,rgba(200,140,255,.65))}
.divider::after{background:linear-gradient(270deg,transparent,rgba(200,140,255,.65))}
.divider-inner{color:rgba(230,180,255,.9);font-size:clamp(14px,3vw,18px);letter-spacing:6px;animation:gemSpin 4s linear infinite}
@keyframes gemSpin{0%,100%{transform:scale(1)}50%{transform:scale(1.3) rotate(180deg)}}
.msg{font-family:'Cormorant Garamond',serif;font-size:clamp(15px,3.2vw,17.5px);line-height:2.05;color:rgba(242,236,255,.96);text-align:center;white-space:pre-line;font-style:italic;text-shadow:0 0 35px rgba(150,80,255,.35);background:rgba(255,255,255,.03);border-radius:16px;padding:16px 18px;border:1px solid rgba(180,120,255,.2)}
.card-roses-bottom{text-align:center;font-size:clamp(16px,3.5vw,22px);letter-spacing:6px;margin-top:16px}
.card-roses-bottom span{display:inline-block;animation:roseWave 2.2s ease-in-out infinite}
.card-roses-bottom span:nth-child(odd){animation-delay:.35s}
.hts{font-size:clamp(24px,5vw,30px);margin-top:14px;letter-spacing:8px;text-align:center;display:block;animation:hb 1.4s ease-in-out infinite}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.22)}}
.card-sig{margin-top:18px;text-align:center;border-top:1px solid rgba(180,120,255,.25);padding-top:14px}
.card-sig-crown{font-size:16px;letter-spacing:8px;color:rgba(255,200,80,.55);margin-bottom:5px;animation:crownGlow 2s ease-in-out infinite}
.card-sig-text{font-family:'Cinzel Decorative',serif;font-size:clamp(7px,1.6vw,8.5px);letter-spacing:3px;color:rgba(160,180,255,.45)}

/* ── TOOLTIP ── */
#tip{position:fixed;z-index:300;background:linear-gradient(135deg,rgba(18,6,55,.96),rgba(8,3,38,.96));border:1px solid rgba(180,120,255,.5);border-radius:12px;padding:7px 16px;color:#d8c8ff;font-family:'Cormorant Garamond',serif;font-size:14px;pointer-events:none;display:none;white-space:nowrap;box-shadow:0 0 22px rgba(130,60,255,.45);letter-spacing:1px}

/* ── RIPPLE OVERLAY ── */
#ripple-canvas{position:fixed;inset:0;pointer-events:none;z-index:5;opacity:.18}

/* ── HINT ── */
#hint{position:fixed;bottom:68px;left:50%;transform:translateX(-50%);color:rgba(180,140,255,.55);font-family:'Cormorant Garamond',serif;font-size:clamp(11px,2.5vw,13px);letter-spacing:2px;pointer-events:none;z-index:100;text-align:center;white-space:nowrap;animation:fadeHint 8s ease-in-out 4s forwards}
@keyframes fadeHint{0%{opacity:1}80%{opacity:.4}100%{opacity:0}}

@media(max-width:600px){.card-inner{padding:18px 18px 22px}#musbtn{bottom:14px;right:12px;padding:9px 14px;font-size:12px}}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-crowns">♛ ✦ ♛</div>
  <div class="intro-rose">🌹</div>
  <div class="intro-title">Para Aslin,<br>mi galaxia entera</div>
  <div class="intro-sub">✦ un universo creado solo para ti ✦</div>
  <button class="intro-btn" onclick="startExperience()">Entrar a tu galaxia</button>
  <div class="intro-crowns">♛ ✦ ♛</div>
</div>

<canvas id="c"></canvas>
<canvas id="ripple-canvas"></canvas>

<!-- Music popup -->
<div id="muspopup">
  <div class="muspop-box">
    <div class="muspop-title">♛ Nuestra canción ♛</div>
    <div class="muspop-icon">🌹</div>
    <div class="muspop-song">Siesta Freestyle</div>
    <div class="muspop-artist">Lewis OfMan &amp; Alicia te quiero</div>
    <div class="muspop-btns">
      <button class="muspop-btn muspop-open" onclick="openSong()">▶ Escuchar en YouTube</button>
      <button class="muspop-btn muspop-skip" onclick="closeMuspop()">Ahora no</button>
    </div>
  </div>
</div>

<!-- Letter modal -->
<div id="overlay">
  <div id="card">
    <canvas id="cStars"></canvas>
    <span class="card-corner tl">🌹</span>
    <span class="card-corner tr">✦</span>
    <span class="card-corner bl">✦</span>
    <span class="card-corner br">🌹</span>
    <div class="card-top"></div>
    <div class="card-inner">
      <button id="close-btn">✕</button>
      <div class="card-crown">♛ ♛ ♛</div>
      <div class="card-roses"><span>🌹</span><span>✦</span><span>🌹</span><span>✦</span><span>🌹</span></div>
      <div class="card-deco"><span>✦</span><span>✧</span><span>✦</span><span>✧</span><span>✦</span></div>
      <div class="sub" id="p-sub"></div>
      <div class="ttl" id="p-ttl"></div>
      <div class="divider"><span class="divider-inner">🌹 ❋ 🌹</span></div>
      <div class="msg" id="p-msg"></div>
      <div class="card-roses-bottom"><span>🌹</span><span>✦</span><span>💜</span><span>✦</span><span>🌹</span></div>
      <span class="hts" id="p-hts"></span>
      <div class="card-sig">
        <div class="card-sig-crown">♛ ✦ ♛</div>
        <div class="card-sig-text">— Con todo mi amor infinito, para Aslin —</div>
      </div>
    </div>
  </div>
</div>

<div id="tip"></div>
<button id="musbtn" style="display:none"><span class="note">♪</span> Nuestra canción</button>
<div id="hint" style="display:none">✦ Toca un planeta para abrir una carta ✦</div>

<script>
// ── INTRO ──
function startExperience(){
  var intro=document.getElementById('intro');
  intro.classList.add('fadeout');
  setTimeout(function(){
    intro.style.display='none';
    document.getElementById('musbtn').style.display='flex';
    document.getElementById('hint').style.display='block';
    setTimeout(function(){document.getElementById('muspopup').classList.add('show');},600);
    startCameraFlyIn();
  },1200);
}
function openSong(){window.open('https://youtu.be/MLZj56EZzBc','_blank');closeMuspop();}
function closeMuspop(){document.getElementById('muspopup').classList.remove('show');}
document.getElementById('musbtn').onclick=function(e){e.stopPropagation();document.getElementById('muspopup').classList.add('show');};

// ── FLOATING PARTICLES ──
var floatEmojis=['🌹','💜','💙','✦','💫','🌟','💎','💕','🩷','💗','✨','♛','🌸','❤️‍🔥'];
function spawnParticle(){
  var h=document.createElement('div');h.className='fpart';
  h.textContent=floatEmojis[Math.floor(Math.random()*floatEmojis.length)];
  h.style.left=(2+Math.random()*96)+'vw';
  h.style.bottom=(Math.random()*8)+'px';
  h.style.fontSize=(12+Math.random()*16)+'px';
  h.style.animationDuration=(3.8+Math.random()*2.5)+'s';
  document.body.appendChild(h);
  setTimeout(function(){h.remove();},6500);
}
setInterval(spawnParticle,1600);

// ── CLICK BURST ──
document.getElementById('c').addEventListener('click',function(e){
  if(document.getElementById('overlay').classList.contains('open'))return;
  var emojis=['🌹','💜','✦','💫','💕','🌟','♛'];
  for(var i=0;i<5;i++){
    var b=document.createElement('div');b.className='burst';
    b.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    b.style.left=(e.clientX-20+Math.random()*40-40)+'px';
    b.style.top=(e.clientY-20+Math.random()*40-40)+'px';
    b.style.animationDuration=(.5+Math.random()*.5)+'s';
    document.body.appendChild(b);
    setTimeout(function(){b.remove();},1000);
  }
});

// card stars canvas
function initCardStars(){
  var cs=document.getElementById('cStars');
  var card=document.getElementById('card');
  cs.width=card.offsetWidth||520;cs.height=card.offsetHeight||540;
  var ctx=cs.getContext('2d');
  var stars=[];
  for(var i=0;i<130;i++)stars.push({
    x:Math.random()*cs.width,y:Math.random()*cs.height,
    r:.2+Math.random()*1.7,o:Math.random(),s:.003+Math.random()*.018,
    c:['rgba(210,160,255,','rgba(120,200,255,','rgba(255,190,230,','rgba(255,230,120,'][Math.floor(Math.random()*4)]
  });
  (function drawCS(){
    ctx.clearRect(0,0,cs.width,cs.height);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];s.o+=s.s;if(s.o>1||s.o<0)s.s=-s.s;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=s.c+s.o.toFixed(2)+')';ctx.fill();
    }
    requestAnimationFrame(drawCS);
  })();
}
document.getElementById('close-btn').onclick=closeLetter;
document.getElementById('overlay').onclick=function(e){if(e.target===this)closeLetter();};
function closeLetter(){document.getElementById('overlay').classList.remove('open');}
function openLetter(d){
  document.getElementById('p-sub').textContent=d.name;
  document.getElementById('p-ttl').textContent=d.title;
  document.getElementById('p-msg').textContent=d.msg;
  document.getElementById('p-hts').textContent=d.hearts;
  document.getElementById('overlay').classList.add('open');
  setTimeout(initCardStars,80);
}

// ── 9 PLANETS ──
var PLANETS=[
  {name:'Planeta Amor',title:'Para Aslin, con todo mi corazón 🌹',msg:'Desde el primer momento en que te vi,\nsupe que eras especial.\nEres la razón por la que sonrío cada día,\nla persona que hace que todo valga la pena.\n\nTe amo con cada parte de mí, Aslin.',hearts:'🌹 ♥ 🌹',r:36,speed:.0009,tilt:.2,size:3.2,c1:[.88,.2,.95],c2:[.3,.04,.5],gc:'rgba(200,50,255,.7)'},
  {name:'Planeta Felicidad',title:'Aslin, eres mi felicidad 🌟',msg:'Contigo aprendí que la felicidad\nno es un lugar al que se llega,\nsino una persona con quien estás.\n\nEsa persona eres tú.\nSiempre tú, siempre Aslin.',hearts:'🌟 ♥ 🌟',r:52,speed:.00055,tilt:-.28,size:2.9,c1:[.1,.55,1.0],c2:[.02,.14,.52],gc:'rgba(20,140,255,.7)'},
  {name:'Planeta Eternidad',title:'Mi amor por ti no tiene fin ∞',msg:'Como las estrellas que nunca se apagan,\ncomo la galaxia que gira sin cesar,\nmi amor por ti no tiene fin.\n\nAslin, te amaré siempre.\nEn esta vida y en todas las que vengan.',hearts:'♥ ∞ ♥',r:68,speed:.0004,tilt:.42,size:4.1,c1:[.0,.85,.75],c2:[.0,.28,.42],gc:'rgba(0,210,190,.65)'},

function updateCam(){

// ── PLANET TEXTURE ──
function makeTex(rgb1,rgb2){
  var sz=512;var cv=document.createElement('canvas');cv.width=cv.height=sz;
  var ctx=cv.getContext('2d');
  function c(rgb,a){return 'rgba('+Math.round(rgb[0]*255)+','+Math.round(rgb[1]*255)+','+Math.round(rgb[2]*255)+','+(a||1)+')';}
  function mix(a,b,t){return[a[0]*(1-t)+b[0]*t,a[1]*(1-t)+b[1]*t,a[2]*(1-t)+b[2]*t];}
  var g=ctx.createRadialGradient(sz*.36,sz*.32,0,sz/2,sz/2,sz*.52);
  g.addColorStop(0,c(mix(rgb1,[1,1,1],.35)));g.addColorStop(.3,c(rgb1));
  g.addColorStop(.62,c(mix(rgb1,rgb2,.5)));g.addColorStop(.88,c(rgb2));g.addColorStop(1,'rgba(0,0,0,1)');
  ctx.fillStyle=g;ctx.fillRect(0,0,sz,sz);
  for(var k=0;k<12;k++){
    ctx.beginPath();ctx.moveTo(0,sz*(.03+k*.082));
    ctx.bezierCurveTo(sz*.22,sz*(-.01+k*.082),sz*.78,sz*(.06+k*.082),sz,sz*(.03+k*.082));
    ctx.strokeStyle='rgba(255,255,255,'+(0.04+Math.random()*.1)+')';ctx.lineWidth=4+Math.random()*9;ctx.stroke();
  }
  var sp=ctx.createRadialGradient(sz*.3,sz*.27,0,sz*.3,sz*.27,sz*.22);
  sp.addColorStop(0,'rgba(255,255,255,.42)');sp.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sp;ctx.fillRect(0,0,sz,sz);
  var ld=ctx.createRadialGradient(sz*.52,sz*.54,sz*.26,sz/2,sz/2,sz*.52);
  ld.addColorStop(0,'rgba(0,0,0,0)');ld.addColorStop(1,'rgba(0,0,0,.62)');
  ctx.fillStyle=ld;ctx.fillRect(0,0,sz,sz);
  return new THREE.CanvasTexture(cv);
}

function makeHeartTex(hex){
  var sz=128;var cv=document.createElement('canvas');cv.width=cv.height=sz;var ctx=cv.getContext('2d');
  var cx=sz/2,cy=sz*.48,hw=sz*.33;
  var r=parseInt(hex.slice(1,3),16),g2=parseInt(hex.slice(3,5),16),b2=parseInt(hex.slice(5,7),16);
  var rgba=function(a){return 'rgba('+r+','+g2+','+b2+','+a+')';};
  var gr=ctx.createRadialGradient(cx,cy,0,cx,cy,sz*.5);
  gr.addColorStop(0,rgba(.65));gr.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=gr;ctx.fillRect(0,0,sz,sz);

  ctx.bezierCurveTo(cx-hw*.18,cy-hw,cx,cy-hw*.48,cx,cy-hw*.14);
  ctx.bezierCurveTo(cx,cy-hw*.48,cx+hw*.18,cy-hw,cx+hw*.64,cy-hw);

  ctx.closePath();ctx.shadowColor=hex;ctx.shadowBlur=26;ctx.fillStyle=hex;ctx.fill();
  var sp=ctx.createRadialGradient(cx-hw*.2,cy-hw*.18,0,cx,cy,hw);
  sp.addColorStop(0,'rgba(255,255,255,.72)');sp.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=sp;ctx.fill();
  return new THREE.CanvasTexture(cv);
}

for(var i=0;i<70;i++){
  var hc=heartColors[i%heartColors.length];
  var hs=new THREE.Sprite(new THREE.SpriteMaterial({map:makeHeartTex(hc),transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,opacity:0}));
  var dist=32+Math.random()*130;var theta=Math.random()*Math.PI*2,phi2=Math.random()*Math.PI;
  hs.position.set(dist*Math.sin(phi2)*Math.cos(theta),(Math.random()-.5)*75,dist*Math.sin(phi2)*Math.sin(theta));
  var sc=1.6+Math.random()*3.8;hs.scale.set(sc,sc,1);
  hs._bs=sc;hs._ph=Math.random()*Math.PI*2;hs._sp2=.38+Math.random()*.75;
  hs._or=dist;hs._ot=theta;hs._os=(Math.random()-.5)*.00042;
  hs._yo=(Math.random()-.5)*75;hs._yp=Math.random()*Math.PI*2;
  scene.add(hs);heartSprites.push(hs);
}

// ── SHOOTING STARS ──
var sstars=[];
var starPalette=[0x88aaff,0xaa88ff,0x00ddff,0xddaaff,0xffeebb,0xaaffee,0xff88cc,0xffaa44];
function makeStar(){
  var s=new THREE.Vector3(-220+Math.random()*110,-110+Math.random()*220,-110+Math.random()*220);
  var e=new THREE.Vector3(630+Math.random()*200,s.y+(-110+Math.random()*220),s.z+(-110+Math.random()*220));
  var c1b=new THREE.Vector3(s.x+215+Math.random()*110,s.y+(-55+Math.random()*110),s.z+(-55+Math.random()*110));
  var c2b=new THREE.Vector3(e.x-215+Math.random()*110,e.y+(-55+Math.random()*110),e.z+(-55+Math.random()*110));
  var curve=new THREE.CubicBezierCurve3(s,c1b,c2b,e);
  var pts=[];for(var j=0;j<60;j++)pts.push(curve.getPoint(j/59));
  var sc2=starPalette[Math.floor(Math.random()*starPalette.length)];
  var tl=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:sc2,transparent:true,opacity:.82}));
  var head=new THREE.Mesh(new THREE.SphereGeometry(1.15,8,8),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,blending:THREE.AdditiveBlending}));
  var gr=new THREE.Group();gr.add(tl);gr.add(head);
  gr._curve=curve;gr._prog=0;gr._sp=.001+Math.random()*.0013;gr._life=0;gr._ml=300;gr._tl=tl;gr._head=head;gr._pts=pts;
  scene.add(gr);sstars.push(gr);
}
makeStar();makeStar();makeStar();makeStar();makeStar();

// ── PULSE WAVE (2D ripple canvas) ──
var ripCanvas=document.getElementById('ripple-canvas');
ripCanvas.width=W;ripCanvas.height=H;
var ripCtx=ripCanvas.getContext('2d');
var pulses=[];
function triggerPulse(){
  pulses.push({r:0,maxR:Math.max(W,H)*.75,op:1,color:'rgba(160,80,255,'});
}
setInterval(triggerPulse,4000);
function drawPulses(){
  ripCtx.clearRect(0,0,W,H);
  for(var i=pulses.length-1;i>=0;i--){
    var p=pulses[i];
    p.r+=2.5;p.op=Math.max(0,1-p.r/p.maxR);
    if(p.op<=0){pulses.splice(i,1);continue;}
    ripCtx.beginPath();ripCtx.arc(W/2,H/2,p.r,0,Math.PI*2);
    ripCtx.strokeStyle=p.color+p.op.toFixed(2)+')';
    ripCtx.lineWidth=2;ripCtx.stroke();
  }
}

// ── RAYCASTER ──
var ray=new THREE.Raycaster(),mouse2=new THREE.Vector2(),tip=document.getElementById('tip');
cvs.addEventListener('mousemove',function(e){
  mouse2.x=(e.clientX/W)*2-1;mouse2.y=-(e.clientY/H)*2+1;
  ray.setFromCamera(mouse2,cam);
  var hits=ray.intersectObjects(orbitMeshes,false);
  if(hits.length){
    cvs.style.cursor='pointer';tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';
    tip.textContent='🌹 '+hits[0].object._pd.name+' — ¡toca!';
  }else{cvs.style.cursor='default';tip.style.display='none';}
});
cvs.addEventListener('click',function(e){
  if(document.getElementById('overlay').classList.contains('open'))return;
  mouse2.x=(e.clientX/W)*2-1;mouse2.y=-(e.clientY/H)*2+1;
  ray.setFromCamera(mouse2,cam);
  var hits=ray.intersectObjects(orbitMeshes,false);
  if(hits.length)openLetter(hits[0].object._pd);
});
cvs.addEventListener('touchend',function(e){
  if(document.getElementById('overlay').classList.contains('open'))return;
  var tc=e.changedTouches[0];
  mouse2.x=(tc.clientX/W)*2-1;mouse2.y=-(tc.clientY/H)*2+1;
  ray.setFromCamera(mouse2,cam);
  var hits=ray.intersectObjects(orbitMeshes,false);
  if(hits.length)openLetter(hits[0].object._pd);
},{passive:true});

// ── ANIMATE ──
var clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  var t=clock.getElapsedTime();

  // camera fly-in
  if(flyIn){
    flyProgress=Math.min(1,flyProgress+.005);
    var ease=1-Math.pow(1-flyProgress,4);
    camDist=flyStart+(65-flyStart)*ease;
    if(flyProgress>=1)flyIn=false;
    updateCam();
  }
  if(autoRot&&!flyIn){camTheta+=.0016;updateCam();}

  mainPlanet.rotation.y+=.0028;
  asteroidBelt.rotation.y+=.0006;
  rings.forEach(function(r,i){r.rotation.z+=r._rotSpeed*(i%2===0?1:-1);});
  gpts.rotation.y+=.00022;

  // moon orbit
  moonAngle+=.008;
  moon.position.x=Math.cos(moonAngle)*16;
  moon.position.z=Math.sin(moonAngle)*16;
  moon.position.y=Math.sin(moonAngle*.7)*3;

  // main text
  if(window._mainTxt){
    window._mainTxt.lookAt(cam.position);
    window._mainTxt.material.opacity=.72+Math.sin(t*2.4)*.28;
    window._mainTxt.position.y=28+Math.sin(t*1.7)*.9;
  }

  // text rings
  for(var i=0;i<textRings.length;i++){
    var rgx=textRings[i];rgx._off+=rgx._sp;
    rgx.rotation.x=i/textRings.length*Math.PI;rgx.rotation.y=rgx._off;
  }

  // orbital planets
  for(var i=0;i<orbitMeshes.length;i++){
    var pm=orbitMeshes[i],pd=pm._pd;
    pm._angle+=pd.speed;
    pm.position.x=Math.cos(pm._angle)*pd.r;
    pm.position.z=Math.sin(pm._angle)*pd.r;
    pm.position.y=Math.sin(pm._angle+pd.tilt)*11;
    pm.rotation.y+=.007;
  }

  // shooting stars
  for(var i=sstars.length-1;i>=0;i--){
    var st=sstars[i];st._life++;
    var op=1;
    if(st._life<30)op=st._life/30;else if(st._life>st._ml-30)op=(st._ml-st._life)/30;
    st._prog+=st._sp;
    if(st._prog>1){scene.remove(st);sstars.splice(i,1);continue;}
    var cp=st._curve.getPoint(st._prog);st.position.copy(cp);
    st._head.material.opacity=op;
    var tp=st._pts;tp[0].copy(cp);
    for(var j=1;j<60;j++)tp[j].copy(st._curve.getPoint(Math.max(0,st._prog-j*.012)));
    st._tl.geometry.setFromPoints(tp);st._tl.material.opacity=op*.8;
  }
  if(sstars.length<6&&Math.random()<.028)makeStar();

  // heart stars
  for(var i=0;i<heartSprites.length;i++){
    var hs=heartSprites[i];
    hs.material.opacity=.3+.7*Math.abs(Math.sin(t*hs._sp2+hs._ph));
    var beat=hs._bs*(1+.18*Math.sin(t*hs._sp2*2+hs._ph));
    hs.scale.set(beat,beat,1);
    hs._ot+=hs._os;
    hs.position.x=Math.cos(hs._ot)*hs._or;
    hs.position.z=Math.sin(hs._ot)*hs._or;
    hs.position.y=hs._yo+Math.sin(t*.22+hs._yp)*6;
  }

  drawPulses();
  ren.render(scene,cam);
}
updateCam();animate();

window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  cam.aspect=W/H;cam.updateProjectionMatrix();ren.setSize(W,H);
  ripCanvas.width=W;ripCanvas.height=H;
});
</script>
