<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Aslin 💕 Mi Galaxia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:#00000f}
#c{display:block;position:fixed;top:0;left:0;width:100vw;height:100vh}

/* ── MUSIC BUTTON ── */
#musbtn{
  position:fixed;bottom:22px;right:22px;z-index:400;
  background:linear-gradient(135deg,rgba(80,20,200,.85),rgba(0,120,220,.85));
  border:1px solid rgba(160,120,255,.5);border-radius:50px;
  padding:10px 18px;color:#e0d4ff;font-size:13px;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  box-shadow:0 0 24px rgba(100,60,255,.4);transition:.3s;
  font-family:'Cormorant Garamond',serif;letter-spacing:1px;
  backdrop-filter:blur(8px);
}
#musbtn:hover{box-shadow:0 0 38px rgba(120,80,255,.7);transform:scale(1.05);}
#musbtn.playing{animation:mbpulse 2s ease-in-out infinite;}
.note{font-size:18px;animation:spin 3s linear infinite;}
@keyframes spin{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
@keyframes mbpulse{0%,100%{box-shadow:0 0 24px rgba(100,60,255,.4)}50%{box-shadow:0 0 44px rgba(120,80,255,.8)}}

/* ── FLOATING HEARTS ── */
.fheart{
  position:fixed;pointer-events:none;z-index:150;
  font-size:18px;animation:floatUp 4s ease-in forwards;
}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(0) scale(.5)}
  20%{opacity:1;transform:translateY(-30px) scale(1)}
  100%{opacity:0;transform:translateY(-200px) scale(.7)}
}

/* ── OVERLAY ── */
#overlay{
  display:none;position:fixed;inset:0;z-index:999;
  background:radial-gradient(ellipse at 40% 30%,rgba(30,10,80,.88),rgba(0,5,30,.95));
  backdrop-filter:blur(14px);
  justify-content:center;align-items:center;
}
#overlay.open{display:flex}

/* ── CARD ── */
#card{
  position:relative;
  width:min(520px,92vw);
  background:
    radial-gradient(ellipse at 25% 15%,rgba(120,60,255,.22) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 85%,rgba(0,160,255,.16) 0%,transparent 50%),
    radial-gradient(ellipse at 60% 50%,rgba(180,80,255,.1) 0%,transparent 60%),
    linear-gradient(160deg,rgba(12,6,40,0.97),rgba(6,4,28,0.99));
  border-radius:26px;
  padding:0;
  overflow:visible;
  box-shadow:
    0 0 0 1px rgba(160,120,255,.35),
    0 0 50px rgba(100,50,255,.3),
    0 0 100px rgba(0,120,255,.12),
    0 0 200px rgba(80,30,180,.08);
  animation:cardPop .55s cubic-bezier(.34,1.56,.64,1);
}
@keyframes cardPop{from{transform:scale(.45) rotateY(20deg);opacity:0}to{transform:scale(1) rotateY(0);opacity:1}}

/* corner stars */
.cstar{
  position:absolute;font-size:28px;pointer-events:none;
  animation:ctwinkle 2s ease-in-out infinite;
}
.cstar:nth-child(1){top:-18px;left:-18px;animation-delay:0s;}
.cstar:nth-child(2){top:-18px;right:-18px;animation-delay:.5s;}
.cstar:nth-child(3){bottom:-18px;left:-18px;animation-delay:1s;}
.cstar:nth-child(4){bottom:-18px;right:-18px;animation-delay:1.5s;}
@keyframes ctwinkle{0%,100%{opacity:.4;transform:scale(.8) rotate(0deg)}50%{opacity:1;transform:scale(1.2) rotate(15deg)}}

/* top bar */
.card-top{
  width:100%;height:5px;border-radius:26px 26px 0 0;
  background:linear-gradient(90deg,#a855f7,#38bdf8,#f472b6,#818cf8,#a855f7);
  background-size:300% 100%;
  animation:barShift 4s linear infinite;
}
@keyframes barShift{0%{background-position:0%}100%{background-position:300%}}

/* card stars canvas */
#cStars{position:absolute;inset:0;pointer-events:none;z-index:0;border-radius:26px;overflow:hidden;}

.card-inner{position:relative;z-index:1;padding:30px 38px 34px;}

#close-btn{
  position:absolute;top:13px;right:15px;
  background:rgba(140,100,255,.15);border:1px solid rgba(160,120,255,.35);
  color:rgba(200,170,255,.9);font-size:15px;cursor:pointer;
  border-radius:50%;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  transition:.3s;z-index:10;
}
#close-btn:hover{color:#fff;background:rgba(160,100,255,.45);transform:rotate(90deg) scale(1.1);}

.card-deco{text-align:center;font-size:28px;letter-spacing:10px;margin-bottom:10px;}
.card-deco span{display:inline-block;animation:dstar 1.8s ease-in-out infinite;}
.card-deco span:nth-child(1){animation-delay:0s}
.card-deco span:nth-child(2){animation-delay:.3s}
.card-deco span:nth-child(3){animation-delay:.6s}
@keyframes dstar{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.3) rotate(20deg);opacity:1}}

.sub{
  font-family:'Cinzel Decorative',serif;font-size:9.5px;
  letter-spacing:5px;text-transform:uppercase;
  color:rgba(160,220,255,.75);margin-bottom:10px;text-align:center;
}

.ttl{
  font-family:'Playfair Display',serif;font-size:21px;font-weight:700;font-style:italic;
  background:linear-gradient(120deg,#e0c8ff 0%,#a5f3fc 40%,#f0abfc 70%,#e0c8ff 100%);
  background-size:200% 100%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:titleShift 5s linear infinite;
  margin-bottom:18px;line-height:1.45;text-align:center;
}
@keyframes titleShift{0%{background-position:0%}100%{background-position:200%}}

.divider{
  display:flex;align-items:center;gap:12px;
  margin:0 auto 22px;justify-content:center;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;max-width:55px;
  background:linear-gradient(90deg,transparent,rgba(160,120,255,.7));
}
.divider::after{background:linear-gradient(270deg,transparent,rgba(160,120,255,.7))}
.divider-gem{color:#c8a8ff;font-size:18px;animation:gemSpin 4s linear infinite;}
@keyframes gemSpin{0%,100%{transform:scale(1)}50%{transform:scale(1.3) rotate(180deg)}}

.msg{
  font-family:'Cormorant Garamond',serif;font-size:17px;
  line-height:2.1;
  color:rgba(240,235,255,.95);
  text-align:center;white-space:pre-line;font-style:italic;
  text-shadow:0 0 30px rgba(140,100,255,.3);
}

.hts{
  font-size:26px;margin-top:22px;letter-spacing:10px;text-align:center;
  display:block;animation:hb 1.4s ease-in-out infinite;
}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.22)}}

.card-bottom{
  margin-top:20px;text-align:center;
  font-family:'Cinzel Decorative',serif;font-size:8.5px;
  letter-spacing:4px;color:rgba(160,180,255,.45);
  border-top:1px solid rgba(140,100,255,.2);padding-top:14px;
}

/* ── TOOLTIP ── */
#tip{
  position:fixed;z-index:300;
  background:linear-gradient(135deg,rgba(20,8,60,.95),rgba(8,4,40,.95));
  border:1px solid rgba(140,100,255,.4);border-radius:10px;
  padding:6px 14px;color:#d4c8ff;
  font-family:'Cormorant Garamond',serif;font-size:14px;
  pointer-events:none;display:none;white-space:nowrap;
  box-shadow:0 0 20px rgba(100,60,255,.35);
}

/* music popup */
#muspopup{
  display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,10,.92);backdrop-filter:blur(16px);
  justify-content:center;align-items:center;
}
#muspopup.show{display:flex}
.muspop-box{
  background:linear-gradient(145deg,rgba(10,4,40,.98),rgba(5,2,25,.98));
  border:1px solid rgba(160,60,255,.4);
  border-radius:20px;padding:36px 40px;text-align:center;
  box-shadow:0 0 60px rgba(140,40,255,.3),0 0 0 1px rgba(200,60,60,.15);
  max-width:380px;width:90vw;
}
.muspop-title{
  font-family:'Cinzel Decorative',serif;font-size:11px;letter-spacing:4px;
  color:rgba(200,160,255,.7);margin-bottom:10px;text-transform:uppercase;
}
.muspop-song{
  font-family:'Playfair Display',serif;font-size:22px;font-style:italic;
  background:linear-gradient(135deg,#f472b6,#818cf8,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:6px;
}
.muspop-artist{
  font-family:'Cormorant Garamond',serif;font-size:14px;
  color:rgba(180,160,255,.6);margin-bottom:28px;
}
.muspop-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.muspop-btn{
  font-family:'Cormorant Garamond',serif;font-size:14px;letter-spacing:1px;
  padding:10px 20px;border-radius:50px;cursor:pointer;border:none;transition:.25s;
}
.muspop-open{
  background:linear-gradient(135deg,#7b2fff,#0099cc);
  color:#fff;box-shadow:0 0 20px rgba(120,60,255,.5);
}
.muspop-open:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(120,60,255,.8);}
.muspop-close{
  background:rgba(255,255,255,.08);color:rgba(200,180,255,.7);
  border:1px solid rgba(160,120,255,.3);
}
.muspop-close:hover{background:rgba(255,255,255,.14);}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Music popup -->
<div id="muspopup">
  <div class="muspop-box">
    <div class="muspop-title">🎵 Nuestra canción</div>
    <div class="muspop-song">Siesta Freestyle</div>
    <div class="muspop-artist">Lewis OfMan &amp; Alicia te quiero</div>
    <div class="muspop-btns">
      <button class="muspop-btn muspop-open" onclick="openSong()">▶ Abrir en YouTube</button>
      <button class="muspop-btn muspop-close" onclick="closeMuspop()">Cerrar</button>
    </div>
  </div>
</div>

<div id="overlay">
  <div id="card">
    <canvas id="cStars"></canvas>
    <span class="cstar">✦</span>
    <span class="cstar">✦</span>
    <span class="cstar">✦</span>
    <span class="cstar">✦</span>
    <div class="card-top"></div>
    <div class="card-inner">
      <button id="close-btn">✕</button>
      <div class="card-deco"><span>✦</span><span>✧</span><span>✦</span></div>
      <div class="sub" id="p-sub"></div>
      <div class="ttl" id="p-ttl"></div>
      <div class="divider"><span class="divider-gem">❋</span></div>
      <div class="msg" id="p-msg"></div>
      <span class="hts" id="p-hts"></span>
      <div class="card-bottom">— Para Aslin, con todo mi amor infinito —</div>
    </div>
  </div>
</div>

<div id="tip">✦ Toca para abrir</div>
<button id="musbtn"><span class="note">♪</span> <span id="muslabel">Reproducir</span></button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── MUSIC POPUP ──
function openSong(){
  window.open('https://youtu.be/MLZj56EZzBc?si=bW6y7MMSEQc4EAKS','_blank');
  closeMuspop();
}
function closeMuspop(){
  document.getElementById('muspopup').classList.remove('show');
}
var musbtn=document.getElementById('musbtn');
var muslabel=document.getElementById('muslabel');
var muspopShown=false;
musbtn.onclick=function(e){
  e.stopPropagation();
  document.getElementById('muspopup').classList.add('show');
};
// show popup on first click
document.addEventListener('click',function once(e){
  if(e.target.closest && e.target.closest('#muspopup'))return;
  if(e.target===musbtn||e.target.closest('#musbtn'))return;
  document.getElementById('muspopup').classList.add('show');
  document.removeEventListener('click',once);
},{capture:false,once:true});

// ── FLOATING HEARTS ──
function spawnHeart(){
  var h=document.createElement('div');
  h.className='fheart';
  var emojis=['💜','❤️','💙','✨','💫','❤️‍🔥','🌟','💎','💕','🩷','💗','🌹'];
  h.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  h.style.left=Math.random()*100+'vw';
  h.style.bottom='10px';
  h.style.fontSize=(14+Math.random()*18)+'px';
  document.body.appendChild(h);
  setTimeout(function(){h.remove();},4200);
}
setInterval(spawnHeart,1800);

// ── CARD MINI STARS ──
function initCardStars(){
  var cs=document.getElementById('cStars');
  var card=document.getElementById('card');
  cs.width=card.offsetWidth||520;cs.height=card.offsetHeight||480;
  var ctx=cs.getContext('2d');
  var stars=[];
  for(var i=0;i<100;i++) stars.push({
    x:Math.random()*cs.width,y:Math.random()*cs.height,
    r:.3+Math.random()*1.8,o:Math.random(),
    s:0.004+Math.random()*.018,
    c:['rgba(180,140,255,','rgba(120,200,255,','rgba(255,180,230,'][Math.floor(Math.random()*3)]
  });
  function drawCS(){
    ctx.clearRect(0,0,cs.width,cs.height);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];s.o+=s.s;if(s.o>1||s.o<0)s.s=-s.s;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=s.c+s.o.toFixed(2)+')';ctx.fill();
    }
    requestAnimationFrame(drawCS);
  }
  drawCS();
}

// ── CLOSE / OPEN ──
document.getElementById('close-btn').onclick=closeLetter;
document.getElementById('overlay').onclick=function(e){if(e.target===this)closeLetter();};
function closeLetter(){document.getElementById('overlay').classList.remove('open');}
function openLetter(d){
  document.getElementById('p-sub').textContent=d.name;
  document.getElementById('p-ttl').textContent=d.title;
  document.getElementById('p-msg').textContent=d.msg;
  document.getElementById('p-hts').textContent=d.hearts;
  document.getElementById('overlay').classList.add('open');
  setTimeout(initCardStars,60);
}

// ── PLANETS DATA (7 planetas) ──
var PLANETS=[
  {name:'Planeta Amor',title:'Para Aslin, con todo mi corazón 💕',
   msg:'Desde el primer momento en que te vi,\nsupe que eras especial.\nEres la razón por la que sonrío cada día,\nla persona que hace que todo valga la pena.\n\nTe amo con cada parte de mí.',
   hearts:'♥ ♥ ♥',r:36,speed:.0008,tilt:.18,size:3.2,
   c1:[0.85,0.25,0.95],c2:[0.35,0.05,0.5],gc:'rgba(180,60,255,.65)'},
  {name:'Planeta Felicidad',title:'Aslin, eres mi felicidad 🌟',
   msg:'Contigo aprendí que la felicidad\nno es un lugar al que se llega,\nsino una persona con quien estás.\n\nEsa persona eres tú.\nSiempre tú.',
   hearts:'🌟 ♥ 🌟',r:54,speed:.0005,tilt:-.3,size:2.8,
   c1:[0.1,0.55,1.0],c2:[0.02,0.15,0.55],gc:'rgba(20,140,255,.65)'},
  {name:'Planeta Eternidad',title:'Mi amor por ti es eterno ∞',
   msg:'Como las estrellas que nunca se apagan,\ncomo la galaxia que gira sin cesar,\nmi amor por ti no tiene fin.\n\nAslin, te amaré siempre.\nEn esta vida y en todas las que vengan.',
   hearts:'♥ ∞ ♥',r:70,speed:.0003,tilt:.45,size:4.0,
   c1:[0.0,0.85,0.75],c2:[0.0,0.3,0.45],gc:'rgba(0,210,190,.6)'},
  {name:'Planeta Sueños',title:'Aslin, eres mi sueño real 💫',
   msg:'Pensé que el amor así solo existía\nen las películas y las canciones.\nHasta que llegaste tú.\n\nEres todo lo que soñé\ny mil cosas más que nunca imaginé.',
   hearts:'💫 ♥ 💫',r:86,speed:.00024,tilt:-.55,size:3.5,
   c1:[0.55,0.08,0.92],c2:[0.18,0.0,0.42],gc:'rgba(140,40,240,.65)'},
  {name:'Planeta Promesas',title:'Mis promesas para ti 🤍',
   msg:'Te prometo estar siempre,\nen los días de sol y en los de lluvia.\nTe prometo hacerte reír\ncuando más lo necesites.\n\nEres mi mayor promesa cumplida.',
   hearts:'🤍 💜 🤍',r:100,speed:.00018,tilt:.35,size:3.0,
   c1:[0.9,0.7,0.3],c2:[0.5,0.3,0.05],gc:'rgba(220,160,40,.55)'},
  {name:'Planeta Momentos',title:'Cada momento contigo ✨',
   msg:'Cada mirada, cada risa,\ncada momento junto a ti\nes un tesoro que guardo\nen lo más profundo de mi corazón.\n\nGracias por existir, Aslin.',
   hearts:'✨ ♥ ✨',r:116,speed:.00014,tilt:-.4,size:2.6,
   c1:[0.05,0.7,0.55],c2:[0.0,0.28,0.35],gc:'rgba(10,180,140,.55)'},
  {name:'Planeta Futuro',title:'Nuestro futuro juntos 🌠',
   msg:'Sueño con todo lo que nos espera,\ncada aventura que vivimos,\ncada noche mirando las estrellas.\n\nContigo quiero construir\nel futuro más bonito del universo.',
   hearts:'🌠 💙 🌠',r:130,speed:.0001,tilt:.5,size:3.8,
   c1:[0.3,0.2,0.9],c2:[0.1,0.05,0.5],gc:'rgba(80,60,220,.65)'}
];

// ── THREE SETUP ──
var W=window.innerWidth,H=window.innerHeight;
var scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x00000a,.0011);
var cam=new THREE.PerspectiveCamera(68,W/H,.1,100000);
var camTheta=0,camPhi=.3,camDist=65,autoRot=true;
function updateCam(){
  cam.position.x=camDist*Math.sin(camPhi)*Math.sin(camTheta);
  cam.position.y=camDist*Math.cos(camPhi);
  cam.position.z=camDist*Math.sin(camPhi)*Math.cos(camTheta);
  cam.lookAt(0,0,0);
}
var ren=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
ren.setSize(W,H);ren.setPixelRatio(Math.min(devicePixelRatio,2));
ren.setClearColor(0x00000f);

// controls
var isDrag=false,prev={x:0,y:0};
document.getElementById('c').addEventListener('mousedown',function(e){isDrag=true;prev={x:e.clientX,y:e.clientY};autoRot=false;});
document.addEventListener('mouseup',function(){isDrag=false;});
document.addEventListener('mousemove',function(e){
  if(!isDrag)return;
  camTheta-=(e.clientX-prev.x)*.005;
  camPhi=Math.max(.08,Math.min(Math.PI-.08,camPhi-(e.clientY-prev.y)*.005));
  prev={x:e.clientX,y:e.clientY};updateCam();
});
document.getElementById('c').addEventListener('wheel',function(e){
  camDist=Math.max(5,Math.min(260,camDist+e.deltaY*.05));updateCam();
});
var t0n=null;
document.getElementById('c').addEventListener('touchstart',function(e){t0n=e.touches[0];autoRot=false;},{passive:true});
document.getElementById('c').addEventListener('touchmove',function(e){
  if(!t0n)return;var t1=e.touches[0];
  camTheta-=(t1.clientX-t0n.clientX)*.005;
  camPhi=Math.max(.08,Math.min(Math.PI-.08,camPhi-(t1.clientY-t0n.clientY)*.005));
  t0n=t1;updateCam();
},{passive:true});

// ── GLOW ──
function makeGlow(color,size,op){
  size=size||128;op=op||.55;
  var cv=document.createElement('canvas');cv.width=cv.height=size;
  var ctx=cv.getContext('2d');
  var g=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  g.addColorStop(0,color);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,size,size);
  return new THREE.Sprite(new THREE.SpriteMaterial({
    map:new THREE.CanvasTexture(cv),transparent:true,opacity:op,
    depthWrite:false,blending:THREE.AdditiveBlending
  }));
}

// ── NEBULAE ──
// Mix: crimson-red + deep blue + purple nebulae
var nbc=[
  'rgba(80,20,200,.5)','rgba(220,20,60,.45)','rgba(0,90,220,.5)',
  'rgba(180,10,40,.42)','rgba(180,50,255,.42)','rgba(40,0,160,.52)',
  'rgba(220,30,80,.4)','rgba(100,0,210,.48)','rgba(255,60,100,.3)',
  'rgba(60,190,255,.33)','rgba(150,60,255,.38)','rgba(200,0,60,.32)',
  'rgba(200,90,255,.32)','rgba(80,40,190,.48)','rgba(0,150,230,.38)',
  'rgba(255,30,60,.22)','rgba(140,0,80,.38)','rgba(200,100,255,.28)',
  'rgba(100,240,200,.2)','rgba(180,20,60,.3)'
];
for(var i=0;i<20;i++){
  var nb=makeGlow(nbc[i],320,.48);nb.scale.set(120,120,1);
  nb.position.set((Math.random()-.5)*220,(Math.random()-.5)*130,(Math.random()-.5)*220);
  scene.add(nb);
}
// core glows: purple + red + blue
var cg=makeGlow('rgba(140,80,255,.85)',256,.52);cg.scale.set(12,12,1);scene.add(cg);
var cg2=makeGlow('rgba(0,180,255,.65)',256,.38);cg2.scale.set(16,16,1);scene.add(cg2);
var cg3=makeGlow('rgba(220,20,60,.7)',256,.35);cg3.scale.set(10,10,1);scene.add(cg3);
var cg4=makeGlow('rgba(255,60,120,.5)',256,.28);cg4.scale.set(7,7,1);scene.add(cg4);

// ── GALAXY PARTICLES ──
var N=110000,arms=6,radius=120,spin=.52,rndP=17;
var pos3=new Float32Array(N*3),col3=new Float32Array(N*3),cnt=0;
for(var i=0;i<N;i++){
  var r=Math.pow(Math.random(),rndP)*radius;
  if(r<26&&Math.random()<.72)continue;
  var ba=(i%arms)/arms*Math.PI*2,sa=r*spin*(.75+Math.random()*.5);
  var sc2b=(.14+r/radius*.28)*r;
  var rx=(Math.random()-.5)*sc2b,ry=(Math.random()-.5)*.16*r,rz=(Math.random()-.5)*sc2b;
  var ta=ba+sa;
  var i3=cnt*3;
  pos3[i3]=Math.cos(ta)*r+rx;pos3[i3+1]=ry;pos3[i3+2]=Math.sin(ta)*r+rz;
  var t=r/radius,mr,mg,mb;
  // galaxy arms: warm white core → blue-white → blue-purple → crimson-purple outer
  var armMix=Math.abs(Math.sin((i%arms)/arms*Math.PI*3));// varies per arm
  if(t<.12){mr=1;mg=.95;mb=.82;}// core: warm white
  else if(t<.32){
    // inner: blue-white mixed with hints of red in some arms
    mr=.6+t*.5+armMix*.15;mg=.7+t*.2;mb=1.0;
  }else if(t<.6){
    // mid: blue-purple with red tones
    mr=.45+t*.42+armMix*.2;mg=.18+t*.22;mb=.82+t*.1;
  }else{
    // outer: crimson-purple
    mr=.5+t*.35+armMix*.18;mg=.05+t*.08;mb=.42+t*.18;
  }
  var sc=.55+.45*Math.random();
  col3[i3]=mr*sc;col3[i3+1]=mg*sc;col3[i3+2]=mb*sc;
  cnt++;
}

// ── PLANET TEXTURE ──
function makeTex(rgb1,rgb2){
  var sz=512;
  var cv=document.createElement('canvas');cv.width=cv.height=sz;
  var ctx=cv.getContext('2d');
  function c(rgb,a){return 'rgba('+Math.round(rgb[0]*255)+','+Math.round(rgb[1]*255)+','+Math.round(rgb[2]*255)+','+(a||1)+')';}
  function mix(a,b,t){return [a[0]*(1-t)+b[0]*t,a[1]*(1-t)+b[1]*t,a[2]*(1-t)+b[2]*t];}
  var g=ctx.createRadialGradient(sz*.37,sz*.33,0,sz/2,sz/2,sz*.52);
  g.addColorStop(0,c(mix(rgb1,[1,1,1],.3)));
  g.addColorStop(.35,c(rgb1));
  g.addColorStop(.65,c(mix(rgb1,rgb2,.5)));
  g.addColorStop(.88,c(rgb2));
  g.addColorStop(1,c([0,0,0]));
  ctx.fillStyle=g;ctx.fillRect(0,0,sz,sz);
  // bands
  for(var k=0;k<10;k++){
    ctx.beginPath();ctx.moveTo(0,sz*.04+k*sz*.1);
    ctx.bezierCurveTo(sz*.25,sz*.01+k*sz*.1,sz*.75,sz*.07+k*sz*.1,sz,sz*.04+k*sz*.1);
    var ba=.05+Math.random()*.11;
    ctx.strokeStyle='rgba(255,255,255,'+ba+')';ctx.lineWidth=5+Math.random()*10;ctx.stroke();
  }
  // specular
  var sp=ctx.createRadialGradient(sz*.3,sz*.28,0,sz*.3,sz*.28,sz*.24);
  sp.addColorStop(0,'rgba(255,255,255,.42)');sp.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sp;ctx.fillRect(0,0,sz,sz);
  // limb dark
  var ld=ctx.createRadialGradient(sz*.52,sz*.54,sz*.28,sz/2,sz/2,sz*.53);
  ld.addColorStop(0,'rgba(0,0,0,0)');ld.addColorStop(1,'rgba(0,0,0,.6)');
  ctx.fillStyle=ld;ctx.fillRect(0,0,sz,sz);
  return new THREE.CanvasTexture(cv);
}

// ── HEART-STARS 3D ──
function hexToRgba(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function makeHeartTex(hexColor){
  var sz=128;
  var cv=document.createElement('canvas');cv.width=cv.height=sz;
  var ctx=cv.getContext('2d');
  var cx=sz/2,cy=sz*0.48,hw=sz*0.34;
  ctx.save();
  // glow aura
  var gr=ctx.createRadialGradient(cx,cy,0,cx,cy,sz*.5);
  gr.addColorStop(0,hexToRgba(hexColor,.6));
  gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gr;ctx.fillRect(0,0,sz,sz);
  // heart path
  ctx.beginPath();
  ctx.moveTo(cx,cy+hw*.6);
  ctx.bezierCurveTo(cx-hw*1.3,cy-.1*hw,cx-hw*1.3,cy-hw,cx-hw*.65,cy-hw);
  ctx.bezierCurveTo(cx-hw*.2,cy-hw,cx,cy-hw*.5,cx,cy-hw*.15);
  ctx.bezierCurveTo(cx,cy-hw*.5,cx+hw*.2,cy-hw,cx+hw*.65,cy-hw);
  ctx.bezierCurveTo(cx+hw*1.3,cy-hw,cx+hw*1.3,cy-.1*hw,cx,cy+hw*.6);
  ctx.closePath();
  ctx.shadowColor=hexColor;ctx.shadowBlur=24;
  ctx.fillStyle=hexColor;ctx.fill();
  // bright highlight
  var sp=ctx.createRadialGradient(cx-hw*.18,cy-hw*.15,0,cx,cy,hw);
  sp.addColorStop(0,'rgba(255,255,255,.75)');sp.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sp;ctx.fill();
  ctx.restore();
  return new THREE.CanvasTexture(cv);
}

function makeStar(){
  var s=new THREE.Vector3(-220+Math.random()*110,-110+Math.random()*220,-110+Math.random()*220);
  var e=new THREE.Vector3(620+Math.random()*200,s.y+(-110+Math.random()*220),s.z+(-110+Math.random()*220));
  var c1b=new THREE.Vector3(s.x+210+Math.random()*110,s.y+(-55+Math.random()*110),s.z+(-55+Math.random()*110));
  var c2b=new THREE.Vector3(e.x-210+Math.random()*110,e.y+(-55+Math.random()*110),e.z+(-55+Math.random()*110));
  var curve=new THREE.CubicBezierCurve3(s,c1b,c2b,e);
  var pts=[];for(var j=0;j<60;j++)pts.push(curve.getPoint(j/59));
  var tgb=new THREE.BufferGeometry().setFromPoints(pts);
  var sc2=starPalette[Math.floor(Math.random()*starPalette.length)];
  var tl=new THREE.Line(tgb,new THREE.LineBasicMaterial({color:sc2,transparent:true,opacity:.8}));
  var head=new THREE.Mesh(new THREE.SphereGeometry(1.1,8,8),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0,blending:THREE.AdditiveBlending}));
  var gr=new THREE.Group();gr.add(tl);gr.add(head);
  gr._curve=curve;gr._prog=0;gr._sp=.001+Math.random()*.0013;gr._life=0;gr._ml=300;gr._tl=tl;gr._head=head;gr._pts=pts;
  scene.add(gr);sstars.push(gr);
}

// ── ANIMATE ──
var clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  var t=clock.getElapsedTime();
  if(autoRot){camTheta+=.0016;updateCam();}

  mainPlanet.rotation.y+=.0028;
  ring.rotation.z+=.0008;

  if(window._mainTxt){
    window._mainTxt.lookAt(cam.position);
    window._mainTxt.material.opacity=.75+Math.sin(t*2.4)*.25;
    window._mainTxt.position.y=27+Math.sin(t*1.7)*.8;
  }

  for(var i=0;i<textRings.length;i++){
    var rgx=textRings[i];
    rgx._off+=rgx._sp;
    rgx.rotation.x=i/textRings.length*Math.PI;
    rgx.rotation.y=rgx._off;
  }

  for(var i=0;i<orbitMeshes.length;i++){
    var pm=orbitMeshes[i],pd=pm._pd;
    pm._angle+=pd.speed;
    pm.position.x=Math.cos(pm._angle)*pd.r;
    pm.position.z=Math.sin(pm._angle)*pd.r;
    pm.position.y=Math.sin(pm._angle+pd.tilt)*10;
    pm.rotation.y+=.007;
  }

  gpts.rotation.y+=.00025;

  for(var i=sstars.length-1;i>=0;i--){
    var st=sstars[i];st._life++;
    var op=1;
    if(st._life<30)op=st._life/30;
    else if(st._life>st._ml-30)op=(st._ml-st._life)/30;
    st._prog+=st._sp;
    if(st._prog>1){scene.remove(st);sstars.splice(i,1);continue;}
    var cp=st._curve.getPoint(st._prog);
    st.position.copy(cp);
    st._head.material.opacity=op;
    var tp=st._pts;tp[0].copy(cp);
    for(var j=1;j<60;j++)tp[j].copy(st._curve.getPoint(Math.max(0,st._prog-j*.012)));
    st._tl.geometry.setFromPoints(tp);
    st._tl.material.opacity=op*.78;
  }
  if(sstars.length<5&&Math.random()<.028)makeStar();

  // ── ANIMATE HEART-STARS ──
  for(var i=0;i<heartSprites.length;i++){
    var hs=heartSprites[i];
    // pulse opacity (twinkle)
    var pulse=0.35+0.65*Math.abs(Math.sin(t*hs._speed+hs._phase));
    hs.material.opacity=pulse;
    // pulse scale (heartbeat)
    var beat=hs._baseScale*(1+0.18*Math.sin(t*hs._speed*2+hs._phase));
    hs.scale.set(beat,beat,1);
    // slow drift orbit
    hs._orbitTheta+=hs._orbitSpeed;
    hs.position.x=Math.cos(hs._orbitTheta)*hs._orbitR;
    hs.position.z=Math.sin(hs._orbitTheta)*hs._orbitR;
    // gentle float up/down
    hs.position.y=hs._yOffset+Math.sin(t*0.22+hs._yPhase)*6;
  }

  ren.render(scene,cam);
}
updateCam();animate();

window.addEventListener('resize',function(){
  W=window.innerWidth;H=window.innerHeight;
  cam.aspect=W/H;cam.updateProjectionMatrix();ren.setSize(W,H);
});
